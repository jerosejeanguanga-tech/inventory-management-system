<div class="min-h-screen flex items-center justify-center bg-gray-950 px-4 py-8 sm:py-12">
  <div class="w-full max-w-lg">

    <!-- Header -->
    <div class="text-center mb-6 sm:mb-8">
      <div class="flex items-center justify-center gap-2 mb-3 sm:mb-4">
        <span class="text-2xl sm:text-3xl">📦</span>
        <span class="text-xl sm:text-2xl font-bold text-white">InvenTrack</span>
      </div>
      <h2 class="text-xl sm:text-2xl font-bold text-white mb-1">Create Account</h2>
      <p class="text-gray-400 text-xs sm:text-sm">Join InvenTrack to manage inventory</p>
    </div>

    <!-- Card -->
    <div class="bg-gray-900 border border-gray-800 rounded-xl p-5 sm:p-7">

      <div *ngIf="error"
           class="bg-red-500/10 border border-red-500/30 text-red-400 px-4 py-3 rounded-lg mb-4 text-xs sm:text-sm flex items-start gap-2">
        <span>⚠️</span><span>{{ error }}</span>
      </div>
      <div *ngIf="success"
           class="bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 px-4 py-3 rounded-lg mb-4 text-xs sm:text-sm flex items-center gap-2">
        ✅ {{ success }}
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">

        <!-- Name + Phone -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-semibold text-gray-400 mb-1.5 uppercase tracking-wide">
              Full Name *
            </label>
            <input formControlName="name" type="text"
                   placeholder="Juan Dela Cruz"
                   class="w-full bg-gray-800 border border-gray-700 text-white placeholder-gray-500 rounded-lg px-3 sm:px-4 py-2.5 focus:outline-none focus:border-emerald-500 transition text-sm">
            <p *ngIf="f['name'].touched && f['name'].invalid"
               class="text-red-400 text-xs mt-1">Required</p>
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-400 mb-1.5 uppercase tracking-wide">
              Phone Number
            </label>
            <div class="relative">
              <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-sm">🇵🇭</span>
              <input formControlName="phone"
                     type="tel"
                     placeholder="09123456789"
                     maxlength="11"
                     class="w-full pl-9 bg-gray-800 border text-white placeholder-gray-500 rounded-lg px-4 py-2.5 sm:py-3 focus:outline-none transition text-sm"
                     [class.border-gray-700]="!form.get('phone')?.touched || form.get('phone')?.valid"
                     [class.border-red-500]="form.get('phone')?.touched && form.get('phone')?.invalid"
                     [class.focus:border-emerald-500]="!form.get('phone')?.invalid">
            </div>
            <p *ngIf="phoneError" class="text-red-400 text-xs mt-1.5 flex items-center gap-1">
              ⚠️ {{ phoneError }}
            </p>
            <p *ngIf="form.get('phone')?.touched && form.get('phone')?.valid"
               class="text-emerald-400 text-xs mt-1.5 flex items-center gap-1">
              ✅ Valid phone number
            </p>
          </div>
        </div>

        <!-- Email -->
        <div>
          <label class="block text-xs font-semibold text-gray-400 mb-1.5 uppercase tracking-wide">
            Email Address *
          </label>
          <input formControlName="email" type="email"
                 placeholder="you@example.com"
                 class="w-full bg-gray-800 border border-gray-700 text-white placeholder-gray-500 rounded-lg px-3 sm:px-4 py-2.5 focus:outline-none focus:border-emerald-500 transition text-sm">
          <p *ngIf="f['email'].touched && f['email'].invalid"
             class="text-red-400 text-xs mt-1">Valid email required</p>
        </div>

        <!-- Location -->
        <div>
          <label class="block text-xs font-semibold text-gray-400 mb-1.5 uppercase tracking-wide">
            Location *
          </label>
          <input formControlName="location" type="text"
                 placeholder="City, Province"
                 class="w-full bg-gray-800 border border-gray-700 text-white placeholder-gray-500 rounded-lg px-3 sm:px-4 py-2.5 focus:outline-none focus:border-emerald-500 transition text-sm">
          <p *ngIf="f['location'].touched && f['location'].invalid"
             class="text-red-400 text-xs mt-1">Required</p>
        </div>

        <!-- Password -->
        <div>
          <label class="block text-xs font-semibold text-gray-400 mb-1.5 uppercase tracking-wide">
            Password *
          </label>
          <div class="relative">
            <input [type]="showPassword ? 'text' : 'password'"
                   formControlName="password"
                   placeholder="Min. 6 characters"
                   class="w-full bg-gray-800 border border-gray-700 text-white placeholder-gray-500 rounded-lg px-3 sm:px-4 py-2.5 pr-12 focus:outline-none focus:border-emerald-500 transition text-sm">
            <button type="button" (click)="showPassword = !showPassword"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-200 transition">
              {{ showPassword ? '' : '' }}
            </button>
          </div>
          <p *ngIf="f['password'].touched && f['password'].invalid"
             class="text-red-400 text-xs mt-1">Min. 6 characters</p>
        </div>

        <button type="submit" [disabled]="loading"
                class="w-full bg-emerald-600 text-white py-3 rounded-lg font-semibold hover:bg-emerald-500 active:bg-emerald-700 transition disabled:opacity-50 text-sm sm:text-base mt-1">
          {{ loading ? 'Creating Account...' : 'Create Account' }}
        </button>
      </form>

      <p class="text-center text-xs sm:text-sm text-gray-500 mt-5">
        Already have an account?
        <a routerLink="/login" class="text-emerald-400 font-semibold hover:text-emerald-300 transition">
          Sign in
        </a>
      </p>
    </div>
  </div>
</div>
