<!-- MAIN NAVBAR -->
<nav class="bg-gray-900 border-b border-gray-800 sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6">
    <div class="flex items-center justify-between h-14">

      <!-- LEFT SIDE: User Info + Avatar (Only show if logged in) -->
      <div class="relative" *ngIf="currentUser">
        <button (click)="toggleUserMenu($event)"
                class="flex items-center gap-2.5 bg-gray-800 hover:bg-gray-700 border border-gray-700 hover:border-emerald-500/40 px-3 py-2 rounded-xl transition group">
          <div class="w-8 h-8 rounded-full bg-gradient-to-br from-emerald-500 to-emerald-700 flex items-center justify-center text-white font-bold text-sm flex-shrink-0">
            {{ currentUser?.name?.charAt(0)?.toUpperCase() }}
          </div>
          <div class="hidden sm:block text-left">
            <p class="text-white text-xs font-semibold leading-tight">{{ currentUser?.name }}</p>
            <p class="text-emerald-400 text-xs capitalize leading-tight">{{ currentUser?.role }}</p>
          </div>
          <span class="text-gray-500 text-xs ml-1 transition-transform"
                [class.rotate-180]="userMenuOpen">▾</span>
        </button>

        <div *ngIf="userMenuOpen"
             class="absolute left-0 top-full mt-2 w-56 bg-gray-900 border border-gray-700 rounded-xl shadow-2xl shadow-black/50 overflow-hidden z-50">

          <div class="px-4 py-3 bg-gray-800 border-b border-gray-700">
            <div class="flex items-center gap-3">
              <div class="w-9 h-9 rounded-full bg-gradient-to-br from-emerald-500 to-emerald-700 flex items-center justify-center text-white font-bold text-sm flex-shrink-0">
                {{ currentUser?.name?.charAt(0)?.toUpperCase() }}
              </div>
              <div class="min-w-0">
                <p class="text-white text-sm font-semibold truncate">{{ currentUser?.name }}</p>
                <p class="text-gray-400 text-xs truncate">{{ currentUser?.email }}</p>
              </div>
            </div>
            <div class="mt-2">
              <span class="text-xs font-bold px-2 py-0.5 rounded-full"
                    [class]="currentUser?.role === 'admin'
                      ? 'bg-purple-500/20 text-purple-400 border border-purple-500/30'
                      : 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30'">
                {{ currentUser?.role === 'admin' ? '🔑 Administrator' : '👤 User' }}
              </span>
            </div>
          </div>

          <div class="py-1.5">
            <a routerLink="/profile"
               (click)="userMenuOpen = false"
               class="flex items-center gap-3 px-4 py-2.5 text-gray-300 hover:bg-gray-800 hover:text-white transition text-sm">
              <span class="w-7 h-7 rounded-lg bg-gray-700 flex items-center justify-center text-base">👤</span>
              Profile
            </a>
            <a *ngIf="currentUser?.role === 'admin'"
               routerLink="/admin/dashboard"
               (click)="userMenuOpen = false"
               class="flex items-center gap-3 px-4 py-2.5 text-gray-300 hover:bg-gray-800 hover:text-white transition text-sm">
              <span class="w-7 h-7 rounded-lg bg-purple-500/20 flex items-center justify-center text-base">🔑</span>
              Admin Panel
            </a>
            <a routerLink="/my-requests"
               (click)="userMenuOpen = false"
               class="flex items-center gap-3 px-4 py-2.5 text-gray-300 hover:bg-gray-800 hover:text-white transition text-sm">
              <span class="w-7 h-7 rounded-lg bg-gray-700 flex items-center justify-center text-base">📋</span>
              My Requests
            </a>
          </div>

          <div class="border-t border-gray-700 py-1.5">
            <button (click)="logout()"
                    class="w-full flex items-center gap-3 px-4 py-2.5 text-red-400 hover:bg-red-500/10 transition text-sm">
              <span class="w-7 h-7 rounded-lg bg-red-500/10 flex items-center justify-center text-base">🚪</span>
              Logout
            </button>
          </div>
        </div>

        <div *ngIf="userMenuOpen"
             class="fixed inset-0 z-40"
             (click)="userMenuOpen = false">
        </div>
      </div>

      <!-- Show Login/Register buttons when NOT logged in -->
      <div class="flex items-center gap-2" *ngIf="!currentUser">
        <a routerLink="/login"
           class="text-xs text-gray-400 hover:text-white bg-gray-800 border border-gray-700 hover:border-emerald-500/40 px-4 py-2 rounded-lg transition font-medium">
          Sign In
        </a>
        <a routerLink="/register"
           class="text-xs text-white bg-emerald-600 hover:bg-emerald-500 px-4 py-2 rounded-lg transition font-semibold">
          Register
        </a>
      </div>

      <!-- CENTER: Logo -->
      <div class="flex items-center gap-2">
        <span class="text-xl">📦</span>
        <span class="font-bold text-white text-sm sm:text-base">InvenTrack</span>
      </div>

      <!-- RIGHT SIDE: Nav Links -->
      <div class="flex items-center gap-1">
        <div class="hidden md:flex items-center gap-1">
          <a routerLink="/"
             routerLinkActive="text-emerald-400"
             [routerLinkActiveOptions]="{exact: true}"
             class="px-3 py-2 rounded-lg text-gray-400 hover:bg-gray-800 hover:text-white font-medium text-sm transition">
            Home
          </a>
          <a routerLink="/products"
             routerLinkActive="text-emerald-400"
             class="px-3 py-2 rounded-lg text-gray-400 hover:bg-gray-800 hover:text-white font-medium text-sm transition">
            Products
          </a>
          <a routerLink="/my-requests"
             routerLinkActive="text-emerald-400"
             class="px-3 py-2 rounded-lg text-gray-400 hover:bg-gray-800 hover:text-white font-medium text-sm transition">
            My Requests
          </a>
        </div>

        <button (click)="toggleMobileMenu()"
                class="md:hidden flex items-center justify-center w-9 h-9 rounded-lg bg-gray-800 border border-gray-700 text-gray-400 hover:text-white transition">
          <span *ngIf="!mobileMenuOpen">☰</span>
          <span *ngIf="mobileMenuOpen">✕</span>
        </button>
      </div>
    </div>

    <div *ngIf="mobileMenuOpen"
         class="md:hidden border-t border-gray-800 py-2 space-y-1">
      <a routerLink="/" (click)="mobileMenuOpen=false"
         routerLinkActive="text-emerald-400 bg-gray-800"
         [routerLinkActiveOptions]="{exact: true}"
         class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:bg-gray-800 hover:text-white text-sm transition">
        🏠 Home
      </a>
      <a routerLink="/products" (click)="mobileMenuOpen=false"
         routerLinkActive="text-emerald-400 bg-gray-800"
         class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:bg-gray-800 hover:text-white text-sm transition">
        📦 Products
      </a>
      <a routerLink="/my-requests" (click)="mobileMenuOpen=false"
         routerLinkActive="text-emerald-400 bg-gray-800"
         class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-400 hover:bg-gray-800 hover:text-white text-sm transition">
        📋 My Requests
      </a>
    </div>
  </div>
</nav>
